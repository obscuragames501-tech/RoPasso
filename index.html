<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROPasso | Giriş Yap</title>
    <style>
        /* Genel Stil ve Passo Kırmızısı */
        :root {
            --passo-red: #E30613;
            --passo-white: #FFFFFF;
            --passo-bg: #F5F5F5;
            --discord-blue: #5865F2;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--passo-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: var(--passo-white);
            width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(--passo-red);
        }

        .logo {
            font-size: 48px;
            font-weight: 900;
            color: var(--passo-red);
            margin-bottom: 30px;
            font-style: italic;
        }

        .btn-discord {
            background-color: var(--discord-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.1s, background-color 0.3s;
        }

        .btn-discord:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }

        .btn-discord:active {
            transform: scale(0.98);
        }

        .footer-text {
            margin-top: 25px;
            color: #888;
            font-size: 13px;
        }

        /* Ses Efektleri İçin Görünmez Elementler */
        audio { display: none; }
    </style>
</head>
<body>

    <audio id="hover-sound" src="https://www.soundjay.com/buttons/sounds/button-37.mp3"></audio>
    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <div class="login-container">
        <div class="logo">PASSO</div>
        
        <button class="btn-discord" id="login-btn" onclick="handleLogin()">
            <span>Discord ile Giriş Yap</span>
        </button>

        <p class="footer-text">Başka yöntemler daha sonra eklenecektir.</p>
    </div>

    <script>
        const hoverSound = document.getElementById('hover-sound');
        const clickSound = document.getElementById('click-sound');
        const loginBtn = document.getElementById('login-btn');

        // Hover Sesi
        loginBtn.addEventListener('mouseenter', () => {
            hoverSound.currentTime = 0;
            hoverSound.play().catch(() => {}); // Kullanıcı etkileşimi yoksa hata vermemesi için
        });

        // Click Sesi ve Giriş
        function handleLogin() {
            clickSound.play();
            
            // Discord OAuth2 Bilgileri
            const clientID = 'https://discord.com/oauth2/authorize?client_id=1497727912978153482&permissions=8&response_type=code&redirect_uri=https%3A%2F%2Fropasso.vercel.app%2F&integration_type=0&scope=bot+applications.commands+identify+guilds'; 
            const redirect = encodeURIComponent('https://ropasso.vercel.app');
            const scope = 'identify guilds';
            
            setTimeout(() => {
                window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${clientID}&redirect_uri=${redirect}&response_type=token&scope=${scope}`;
            }, 200);
        }

        // F5 Çekince Otomatik Giriş Kontrolü (LocalStorage)
        window.onload = () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            let accessToken = fragment.get('access_token');

            // Eğer URL'de token varsa, kaydet
            if (accessToken) {
                localStorage.setItem('ropasso_token', accessToken);
                window.location.hash = ""; // URL'deki çirkin tokenı temizle
            }

            // Hafızada token var mı kontrol et
            const savedToken = localStorage.getItem('ropasso_token');
            if (savedToken) {
                // Token varsa direkt ana sayfaya (dashboard) yönlendir veya profili yükle
                console.log("Zaten giriş yapılmış, token aktif.");
                // Buraya ileride: window.location.href = "/dashboard.html"; ekleyebiliriz
            }
        };
    </script>
</body>
</html>
